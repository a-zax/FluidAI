<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Assistant</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <!-- Custom AI Brain Icon -->
                        <circle cx="12" cy="8" r="4"/>
                        <circle cx="12" cy="12" r="7"/>
                        <circle cx="5" cy="15" r="1.5" fill="currentColor"/>
                        <circle cx="19" cy="15" r="1.5" fill="currentColor"/>
                        <circle cx="12" cy="20" r="1.5" fill="currentColor"/>
                    </svg>
                    <span>Enterprise</span>
                </div>
            </div>

            <button class="new-chat-btn" onclick="startNewChat()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <!-- Plus Icon -->
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New Chat
            </button>

            <div class="sidebar-content">
                <div class="chat-history">
                    <div class="chat-history-title">Recent</div>
                    <div id="chat-list"></div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="sidebar-footer-btn" onclick="toggleDocumentModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <path d="M14 2v6h6"></path>
                        <path d="M8 13h8"></path>
                        <path d="M8 17h5"></path>
                    </svg>
                    Add Knowledge
                </button>
                <button class="sidebar-footer-btn" onclick="toggleSettings()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <!-- Settings Gear Icon -->
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m5.08 0l4.24-4.24M1 12h6m6 0h6m-1.78 7.78l-4.24-4.24m-5.08 0l-4.24 4.24"></path>
                    </svg>
                    Settings
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <div class="header">
                <div class="header-title">
                    <span>Enterprise Assistant</span>
                    <small>Demo workspace</small>
                </div>
                <div class="header-controls">
                    <button class="header-btn" onclick="startNewChat()" title="New Chat">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                    <button class="header-btn" onclick="toggleSettings()" title="Settings">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m5.08 0l4.24-4.24M1 12h6m6 0h6m-1.78 7.78l-4.24-4.24m-5.08 0l-4.24 4.24"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Chat Container -->
            <div class="chat-container">
                <div id="messages" class="messages-area">
                    <div class="welcome-screen">
                        <div class="welcome-content">
                            <h1>Good to see you, Aryan.</h1>
                            <p>Ready when you are.</p>
                            
                            <div class="quick-prompts">
                                <div class="quick-prompts-title">Start with</div>
                                <div class="quick-prompt-grid">
                                    <button class="prompt-btn" onclick="sendMessage('Who is employee EMP001?')">
                                        <span class="icon">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <circle cx="12" cy="8" r="3"></circle>
                                                <path d="M6 20c0-3.3 2.7-6 6-6s6 2.7 6 6"></path>
                                            </svg>
                                        </span>
                                        Find EMP001
                                    </button>
                                    <button class="prompt-btn" onclick="sendMessage('Create a support ticket for database issues')">
                                        <span class="icon">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M4 7h16v10H4z"></path>
                                                <path d="M4 11h16"></path>
                                                <path d="M9 7v10"></path>
                                            </svg>
                                        </span>
                                        Create incident ticket
                                    </button>
                                    <button class="prompt-btn" onclick="sendMessage('Generate a sales report')">
                                        <span class="icon">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M4 19h16"></path>
                                                <path d="M7 15v4"></path>
                                                <path d="M12 11v8"></path>
                                                <path d="M17 7v12"></path>
                                                <path d="M4 5h16"></path>
                                            </svg>
                                        </span>
                                        Generate ops report
                                    </button>
                                    <button class="prompt-btn" onclick="sendMessage('Explain enterprise architecture')">
                                        <span class="icon">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M12 2a5 5 0 0 1 5 5c0 2.8-2 4.8-2.4 5.3-.7.8-.6 2.1-.1 3.2A3 3 0 0 0 15 18h-6a3 3 0 0 0 .5-2.5c.5-1.1.6-2.4-.1-3.2C9 11 7 9 7 7a5 5 0 0 1 5-5z"></path>
                                                <path d="M12 22v-4"></path>
                                            </svg>
                                        </span>
                                        Search policy
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="stats-panel" id="stats-panel" style="display: none;">
                    <div class="stat">
                        <div class="stat-label">Latency</div>
                        <div class="stat-value" id="stat-latency">-</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Tokens</div>
                        <div class="stat-value" id="stat-tokens">-</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Cached</div>
                        <div class="stat-value" id="stat-cached">-</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Action</div>
                        <div class="stat-value" id="stat-action">-</div>
                    </div>
                </div>

                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea id="input-box" class="input-box" placeholder="Message Enterprise..." onkeydown="handleKeyPress(event)"></textarea>
                        <button class="send-btn" id="send-btn" onclick="sendMessage()" aria-label="Send message">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <!-- Send Arrow Icon -->
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                    <div class="input-footer">
                        <label class="checkbox">
                            <input type="checkbox" id="enable-actions" checked>
                            Enable actions
                        </label>
                        <span id="char-count">0 / 2000</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settings-modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="close-btn" onclick="toggleSettings()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting">
                    <label>API Endpoint</label>
                    <input type="text" id="api-endpoint" value="http://localhost:8001">
                </div>
                <div class="setting">
                    <label>Theme</label>
                    <select id="theme-select" onchange="changeTheme()">
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                    </select>
                </div>
                <div class="setting">
                    <label>
                        <input type="checkbox" id="show-stats" checked onchange="toggleStats()">
                        Show Statistics
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="toggleSettings()">Close</button>
                <button class="btn-primary" onclick="saveSettings()">Save</button>
            </div>
        </div>
    </div>

    <!-- Document Modal -->
    <div class="modal" id="document-modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Knowledge</h2>
                <button class="close-btn" onclick="toggleDocumentModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting">
                    <label>Title</label>
                    <input type="text" id="document-title" placeholder="Example: VPN Access Policy">
                </div>
                <div class="setting">
                    <label>Source</label>
                    <input type="text" id="document-source" value="manual">
                </div>
                <div class="setting">
                    <label>Content</label>
                    <textarea id="document-body" class="document-textarea" placeholder="Paste an SOP, policy, or internal note here..."></textarea>
                </div>
                <div id="document-status" class="modal-status"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="toggleDocumentModal()">Close</button>
                <button class="btn-primary" onclick="addKnowledgeDocument()">Add</button>
            </div>
        </div>
    </div>

    <!-- Action Modal -->
    <div class="modal" id="action-modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="action-title">Action Result</h2>
                <button class="close-btn" onclick="closeActionModal()">&times;</button>
            </div>
            <div class="modal-body" id="action-body"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
